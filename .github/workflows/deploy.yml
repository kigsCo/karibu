name: Build, test, deploy

on:
  push:
    branches: [main, staging, dev]
  # No branch filter: `branches:` here matches the PR's BASE, so `[main]` meant a
  # PR into any other branch (a phase branch, a stacked PR) was never checked.
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test   # vitest run (one-shot); FIX_PLAN P0 #9
      # NOTE: the pgTAP database tests (supabase/tests/*.sql, incl. the P0 #8
      # improvement-window regression) are NOT run here — they need the local
      # Supabase stack (`supabase db start && supabase test db`, Docker). Run them
      # locally before shipping a migration; wiring them into CI is a follow-up.

  # The edge functions are Deno, so `npm run lint` and `npm run build` never see
  # them (eslint ignores supabase/functions/**). Without this job the security
  # regression tests for mpesa-callback would sit in the repo and never run.
  test-edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # --node-modules-dir=none: the repo root holds the frontend's package.json,
      # and without this Deno adopts it, switches to node_modules resolution, and
      # fails to resolve the functions' own npm/JSR imports.
      - name: Type-check the edge functions
        run: deno check --node-modules-dir=none supabase/functions/_shared/*.ts supabase/functions/*/index.ts
      - name: Run the edge-function tests
        run: deno test --allow-env --allow-net --node-modules-dir=none supabase/functions/

  # The `secrets` context is not available in a job-level `if:`, so resolve it in a
  # step and let the deploy job gate on the output. Until a cloud Supabase project
  # exists, deploying is impossible — `supabase link` would fail on an empty ref.
  check-config:
    runs-on: ubuntu-latest
    outputs:
      supabase_configured: ${{ steps.check.outputs.supabase_configured }}
    steps:
      - id: check
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -n "$SUPABASE_PROJECT_REF" ] && [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "supabase_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::SUPABASE_PROJECT_REF / SUPABASE_ACCESS_TOKEN are unset — skipping the edge-function deploy. Set both repository secrets to enable it."
            echo "supabase_configured=false" >> "$GITHUB_OUTPUT"
          fi

  # Never deploy an edge function whose security tests are failing.
  deploy-supabase-functions:
    needs: [test, test-edge-functions, check-config]
    if: >-
      github.ref == 'refs/heads/main'
      && github.event_name == 'push'
      && needs.check-config.outputs.supabase_configured == 'true'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - run: supabase functions deploy ask-karibu
      - run: supabase functions deploy submit-review
      - run: supabase functions deploy moderate-reviews
      - run: supabase functions deploy calculate-rankings
      - run: supabase functions deploy mpesa-stk-push
      - run: supabase functions deploy mpesa-callback
      - run: supabase functions deploy send-onboarding-email
      - run: supabase functions deploy business-intake
      - run: supabase functions deploy admin-review
      - run: supabase functions deploy merchant-stats

# The frontend is deployed by Vercel via its own GitHub integration (not in this workflow).
