# Supabase local config for Karibu.
# Docs: https://supabase.com/docs/guides/cli/config
# `supabase start` reads this; `supabase db reset` applies migrations/ + seed.sql.

project_id = "karibu"

[api]
enabled = true
port = 54321
# Only the public schema is exposed over PostgREST. Auth/storage have their own.
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Postgres 15 (matches the production project — see CLAUDE.md tech stack table).
major_version = 15

[db.pooler]
enabled = false
port = 54329

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
# Local mailbox so we can inspect onboarding/auth emails during dev.
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# The frontend origin. Override per-environment with SUPABASE_AUTH_SITE_URL.
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "https://karibu.co.ke"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Google OAuth — powers "Continue with Google" on the /welcome landing page.
# Disabled locally by default: the provider needs a real Google OAuth client,
# and there is nothing to test against without one. To use it locally: create
# a Web application OAuth client in Google Cloud Console with redirect URI
# http://127.0.0.1:54321/auth/v1/callback, export
# SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID / SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET,
# and flip enabled = true. In the cloud the provider is configured in
# Dashboard -> Authentication -> Providers (see SUPABASE_SETUP.md).
[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"

[edge_runtime]
enabled = true
# Per-request isolation in production; "oneshot" is fine for local serve.
policy = "oneshot"
inspector_port = 8083

# ---------------------------------------------------------------------------
# Edge functions
# verify_jwt controls whether the platform requires a valid Supabase JWT before
# the function runs. Public/webhook/cron endpoints set it false and do their own
# auth/validation; user-acting endpoints set it true.
#
# verify_jwt = true is NOT an authorization check. The anon key is a valid JWT
# and it ships in the browser bundle, so "true" means "any visitor", not "our
# backend". Functions that only our backend may call therefore keep verify_jwt
# off and authenticate a shared secret themselves — see _shared/internal-auth.ts.
# ---------------------------------------------------------------------------

# Public: browser calls this directly (no login required to chat with the guide).
# Auth/abuse handling is inside the function.
[functions.ask-karibu]
verify_jwt = false

# User-acting: only logged-in users may submit a review. JWT required so the
# reviewer_id = auth.uid() RLS check has an identity to bind to.
[functions.submit-review]
verify_jwt = true

# CRON — hourly. Classifies pending_moderation reviews via Claude.
# Schedule: 0 * * * *  (see SUPABASE_SETUP.md "Scheduling the cron functions")
# verify_jwt off: pg_cron holds no user JWT. Authenticated by the
# x-karibu-internal-secret header (INTERNAL_FUNCTION_SECRET); 503 if unset.
[functions.moderate-reviews]
verify_jwt = false

# CRON — nightly at 03:00 EAT (Africa/Nairobi, UTC+3 => 00:00 UTC).
# Recomputes ranking_score for every active business, then runs the
# improvement-window helpers and refreshes analytics MVs.
# Schedule: 0 0 * * *  (00:00 UTC == 03:00 EAT)
# verify_jwt off: same as above — authenticated by x-karibu-internal-secret.
[functions.calculate-rankings]
verify_jwt = false

# Public: M-Pesa STK push is initiated from the browser checkout flow, so it
# cannot require a JWT until sign-in ships. It is instead OFF unless
# MPESA_ENABLED=true, and when on it rate-limits per source IP and per target
# phone — an STK push rings a phone the caller does not own.
[functions.mpesa-stk-push]
verify_jwt = false

# Public WEBHOOK: Safaricom Daraja posts the payment result here. It cannot send
# a Supabase JWT, so verify_jwt MUST be off. Authentication is instead the shared
# secret MPESA_CALLBACK_SECRET, which mpesa-stk-push bakes into the CallBackURL
# it registers and the handler compares in constant time. The handler also
# verifies the paid Amount against subscriptions.amount_kes and refuses to settle
# a subscription twice. Without the secret set, the handler returns 503 and
# changes nothing — it will not guess whether a caller is Safaricom.
[functions.mpesa-callback]
verify_jwt = false

# Internal/transactional: triggered after a successful subscription. No user JWT,
# so verify_jwt stays off and the x-karibu-internal-secret header authenticates
# the caller. Ungated, this is an open mail relay from our verified domain.
[functions.send-onboarding-email]
verify_jwt = false

# User-acting: a signed-in user registers a new business or claims an existing
# listing. JWT required for identity; the function validates all evidence
# server-side (KRA format, own-folder storage paths, reference slugs) and
# writes with the service role — there are no client INSERT policies on
# businesses/business_claims/business_verifications by design.
[functions.business-intake]
verify_jwt = true

# Staff-only: the onboarding review queue. JWT authenticates the caller; the
# real authorization is profiles.is_staff, checked inside with the service
# role (verify_jwt=true alone would admit any visitor — the anon key is a
# valid JWT). Approvals fire send-onboarding-email server-to-server with the
# x-karibu-internal-secret header.
[functions.admin-review]
verify_jwt = true
